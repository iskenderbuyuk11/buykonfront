<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../../js/favicon.js"></script>

    <title>Sifariş detalları | Buykon.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/header.css?v=7" />
    <link rel="stylesheet" href="../../css/footer.css" />
    <link rel="stylesheet" href="../../css/dark-mode.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="../../css/sifarislerim.css?v=2" />
  </head>
  <body data-root="../../" data-orders-page="detail" class="checkout-body orders-body">
    <div id="site-header"></div>

    <main class="orders-page order-detail-page">
      <div class="orders-page__inner container">
        <header class="orders-head orders-head--detail">
          <a href="./" class="checkout-back">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Sifarişlərim</span>
          </a>
          <h1 class="orders-head__title" id="detail-title">Sifariş detalları</h1>
        </header>

        <div id="detail-missing" class="orders-empty orders-empty--sm" hidden>
          <div class="orders-empty__icon"><i class="fa-solid fa-circle-exclamation"></i></div>
          <h2>Sifariş tapılmadı</h2>
          <p>Bu sifariş mövcud deyil və ya silinib.</p>
          <a href="./" class="orders-empty__btn orders-empty__btn--ghost">
            <i class="fa-solid fa-list"></i>
            Sifarişlər siyahısına qayıt
          </a>
        </div>

        <div id="detail-content" hidden>
          <section class="od-hero" aria-label="Status animasiyası">
            <div class="od-hero__scene" id="detail-scene" data-status="placed">
              <div class="od-anim od-anim--placed" aria-hidden="true">
                <div class="od-anim-placed__ring"></div>
                <div class="od-anim-placed__doc"><i class="fa-solid fa-clipboard-list"></i></div>
              </div>
              <div class="od-anim od-anim--packing" aria-hidden="true">
                <div class="od-anim-box">
                  <div class="od-anim-box__lid"></div>
                  <div class="od-anim-box__item"><i class="fa-solid fa-mobile-screen"></i></div>
                  <div class="od-anim-box__body"></div>
                </div>
              </div>
              <div class="od-anim od-anim--cargo" aria-hidden="true">
                <div class="od-anim-truck">
                  <span class="od-anim-truck__cab"><i class="fa-solid fa-truck"></i></span>
                  <span class="od-anim-truck__road"></span>
                </div>
              </div>
              <div class="od-anim od-anim--delivering" aria-hidden="true">
                <div class="od-anim-route">
                  <span class="od-anim-route__pkg"><i class="fa-solid fa-box"></i></span>
                  <span class="od-anim-route__dots"><i></i><i></i><i></i></span>
                  <span class="od-anim-route__home"><i class="fa-solid fa-house"></i></span>
                </div>
              </div>
              <div class="od-anim od-anim--delivered" aria-hidden="true">
                <div class="od-anim-done">
                  <span class="od-anim-done__check"><i class="fa-solid fa-check"></i></span>
                  <span class="od-anim-done__spark od-anim-done__spark--1"></span>
                  <span class="od-anim-done__spark od-anim-done__spark--2"></span>
                  <span class="od-anim-done__spark od-anim-done__spark--3"></span>
                </div>
              </div>
              <div class="od-anim od-anim--cancelled" aria-hidden="true">
                <div class="od-anim-cancel">
                  <span class="od-anim-cancel__box"><i class="fa-solid fa-box"></i></span>
                  <span class="od-anim-cancel__x"><i class="fa-solid fa-xmark"></i></span>
                </div>
              </div>
            </div>
            <p class="od-hero__status" id="detail-status-label">Sifariş verildi</p>
            <p class="od-hero__hint" id="detail-status-hint"></p>
          </section>

          <section class="od-card" aria-label="Sifariş statusları">
            <div class="od-card__head">
              <span class="od-card__icon"><i class="fa-solid fa-route"></i></span>
              <h2 class="od-card__title">Status izləmə</h2>
            </div>
            <ol class="order-timeline" id="detail-timeline"></ol>
          </section>

          <section class="od-card">
            <div class="od-card__head">
              <span class="od-card__icon"><i class="fa-solid fa-receipt"></i></span>
              <h2 class="od-card__title">Sifariş məlumatları</h2>
            </div>
            <div class="order-detail-grid" id="detail-info"></div>
            <ul class="order-detail-items" id="detail-items"></ul>
          </section>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>
    <div id="site-bottom-nav"></div>
    <script src="../../js/layout.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/auth-guard.js"></script>
    <script src="../../js/orders-store.js"></script>
    <script src="../../js/cart-store.js"></script>
    <script src="../../js/header.js"></script>
    <script src="../../js/footer.js"></script>
    <script src="../../js/sifarislerim.js?v=2"></script>
  </body>
</html>
