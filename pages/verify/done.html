<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../../js/favicon.js"></script>
    <title>Təsdiq tamamlandı | Buykon</title>
    <link rel="stylesheet" href="../../css/main.css" />
    <style>
      .kyc-done { max-width: 520px; margin: 64px auto; padding: 0 16px; text-align: center; }
      .kyc-done__card {
        background: #fff; border: 1px solid #e8eaed; border-radius: 20px;
        padding: 32px 24px; box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06);
      }
      .kyc-done h1 { margin: 12px 0 8px; font-size: 1.4rem; }
      .kyc-done p { color: #64748b; line-height: 1.6; }
      .kyc-done a {
        display: inline-flex; margin-top: 20px; padding: 12px 18px; border-radius: 12px;
        background: #ff6b00; color: #fff; text-decoration: none; font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="kyc-done">
      <div class="kyc-done__card">
        <div style="font-size:2rem;color:#ff6b00"><i class="fa-solid fa-circle-check"></i></div>
        <h1>Proses göndərildi</h1>
        <p>
          Təsdiq nəticəsi bir neçə dəqiqə ərzində hesabınıza əlavə olunacaq.
          Son qərar sistem tərəfindən avtomatik yenilənir.
        </p>
        <a href="../profile/#tehlukesizlik">Profilə qayıt</a>
      </div>
    </main>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </body>
</html>
