<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../../js/favicon.js"></script>

  <title>Səhifə Tapılmadı - Buykon.com</title>

  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/header.css?v=7" />
  <link rel="stylesheet" href="../../css/footer.css" />
  <link rel="stylesheet" href="../../css/dark-mode.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-main: #070b14;
      --bg-secondary: #0d1320;
      --card: rgba(15, 23, 42, 0.72);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #a7b0c0;
      --orange: #ff8a1d;
      --orange-2: #ffb347;
      --blue: #4cc9f0;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 138, 29, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(76, 201, 240, 0.14), transparent 30%),
        linear-gradient(135deg, var(--bg-main), var(--bg-secondary));
      overflow: hidden;
      position: relative;
    }

    .bg-blur {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      z-index: 0;
      animation: floatBlob 8s ease-in-out infinite;
    }

    .blur-1 {
      width: 260px;
      height: 260px;
      background: var(--orange);
      top: -60px;
      left: -70px;
    }

    .blur-2 {
      width: 240px;
      height: 240px;
      background: var(--blue);
      bottom: -70px;
      right: -50px;
      animation-delay: 2s;
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      animation: rise linear infinite;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 2;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 42px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.9s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.04), transparent);
      transform: translateX(-100%);
      animation: shine 5s linear infinite;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--orange-2);
      letter-spacing: 1.4px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-2));
      box-shadow: 0 0 18px rgba(255, 138, 29, 0.9);
    }

    .error-code {
      font-size: clamp(80px, 16vw, 170px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ffffff 10%, var(--orange) 55%, var(--orange-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 35px rgba(255, 138, 29, 0.18);
      margin-bottom: 14px;
      animation: glitchPulse 2.8s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(26px, 4vw, 40px);
      margin-bottom: 14px;
      font-weight: 800;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .desc {
      max-width: 560px;
      margin: 0 auto 30px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border: none;
      cursor: pointer;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      transition: 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--orange-2));
      color: #111;
      box-shadow: 0 12px 28px rgba(255, 138, 29, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 18px 35px rgba(255, 138, 29, 0.35);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-secondary:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
    }

    .mini-text {
      margin-top: 22px;
      color: #7f8aa1;
      font-size: 13px;
    }

    .search-box {
      margin: 28px auto 0;
      max-width: 460px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 10px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 15px;
      padding: 8px 10px;
    }

    .search-box input::placeholder {
      color: #8b95a7;
    }

    .search-box button {
      border: none;
      background: linear-gradient(135deg, var(--orange), var(--orange-2));
      color: #111;
      padding: 11px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .search-box button:hover {
      transform: scale(1.05);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(35px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatBlob {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(24px) scale(1.08);
      }
    }

    @keyframes shine {
      100% {
        transform: translateX(100%);
      }
    }

    @keyframes glitchPulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 0 rgba(255,138,29,0));
      }
      50% {
        transform: scale(1.02);
        filter: drop-shadow(0 0 12px rgba(255,138,29,0.2));
      }
    }

    @keyframes rise {
      from {
        transform: translateY(100vh) scale(0.6);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      to {
        transform: translateY(-10vh) scale(1.1);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 34px 18px;
        border-radius: 22px;
      }

      .desc {
        font-size: 14px;
      }

      .btn {
        width: 100%;
      }

      .search-box {
        flex-direction: column;
      }

      .search-box button,
      .search-box input {
        width: 100%;
      }
    }
  </style>
</head>
<body data-root="../../">
  <div id="site-header"></div>

  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>
  <div class="particles" id="particles"></div>

  <main class="wrapper">
    <section class="card">
      <div class="brand">
        <span class="brand-dot"></span>
        BizdəVar.shop
      </div>

      <div class="error-code">404</div>
      <h1>Səhifə tapılmadı</h1>
      <p class="desc">
        Axtardığınız səhifə silinmiş, adı dəyişdirilmiş və ya ümumiyyətlə mövcud olmaya bilər.
        Ana səhifəyə qayıdaraq alış-verişə davam edə bilərsiniz.
      </p>

      <div class="buttons">
        <a href="../../" class="btn btn-primary">Ana səhifəyə qayıt</a>
        <button class="btn btn-secondary" onclick="history.back()">Geri qayıt</button>
      </div>

      <form class="search-box" onsubmit="goSearch(event)">
        <input type="text" id="searchInput" placeholder="Məhsul, kateqoriya və ya axtardığın şeyi yaz..." />
        <button type="submit">Axtar</button>
      </form>

      <p class="mini-text">
        BizdəVar — istədiyini tap, rahatlıqla sifariş et.
      </p>
    </section>
  </main>

  <script>
    function goSearch(e) {
      e.preventDefault();
      const value = document.getElementById("searchInput").value.trim();

      if (!value) {
        window.location.href = "/";
        return;
      }

      // Öz saytıvın axtarış sisteminə görə bunu dəyişə bilərsən
      window.location.href = "/search?q=" + encodeURIComponent(value);
    }

    const particles = document.getElementById("particles");

    for (let i = 0; i < 28; i++) {
      const dot = document.createElement("span");
      dot.classList.add("particle");
      dot.style.left = Math.random() * 100 + "%";
      dot.style.animationDuration = (5 + Math.random() * 8) + "s";
      dot.style.animationDelay = (Math.random() * 6) + "s";
      dot.style.opacity = Math.random() * 0.6;
      dot.style.width = dot.style.height = (3 + Math.random() * 5) + "px";
      particles.appendChild(dot);
    }
  </script>

  <div id="site-footer"></div>
  <div id="site-bottom-nav"></div>
  <script src="../../js/layout.js"></script>
  <script src="../../js/favorites-store.js"></script>
  <script src="../../js/cart-store.js"></script>
  <script src="../../js/header.js"></script>
  <script src="../../js/footer.js"></script>
</body>
</html>
